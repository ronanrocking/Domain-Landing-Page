<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronan's</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="viewport-section" id="hero">
        <canvas class="gradient-bg" id="hero-canvas"></canvas>
        <div class="container hero-overlay">
            <div class="hero-content">
                <div class="hero-left">
                    <div class="hero-title-group">
                        <h1 id="title_name">Ronan Madan.</h1>
                        <div class="command-bar-wrapper">
                            <input type="text" id="command-input" placeholder="RUN" spellcheck="false" autocomplete="off">
                        </div>
                    </div>
                </div>
                <div class="hero-divider"></div>
                <div class="hero-right">
                    <h2>About this Site</h2>
                    <p>This is landing page to the multiple services running on my self-hosted server, that doubles as my portfolio and archive for past projects.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="viewport-section" id="portfolio">
        <div class="portfolio-container">
            <div class="tab-bar">
                <div class="tab-indicator"></div>
                <button class="tab-btn active" data-tab="live">Live Projects</button>
                <button class="tab-btn" data-tab="archive">Archive</button>
            </div>
            <div class="portfolio-divider"></div>
            <div id="projects-grid" class="projects-grid">
                <!-- Projects will be injected here -->
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>

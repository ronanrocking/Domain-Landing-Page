<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warm Fluid Background</title>
<style>
  :root {
    --bg-color: #ff9a3d;
    --blob1-color: #ff0000;
    --blob2-color: #ff4500;
    --blob3-color: #8b0000;
    --blob4-color: #d2691e;
    --blob5-color: #ff5f1f;
    --blob6-color: #b22222;
  }

  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: var(--bg-color);
  }

  .gradient-bg {
    width: 100%;
    height: 100%;
    position: relative;
    filter: url(#goo);
    overflow: hidden;
  }

  .blob {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    mix-blend-mode: hard-light;
    opacity: 0.8;
  }

  .b1 { background: var(--blob1-color); top: -10%; left: -10%; animation: move1 40s infinite linear; }
  .b2 { background: var(--blob2-color); bottom: -10%; right: -10%; animation: move2 50s infinite linear; }
  .b3 { background: var(--blob3-color); top: 40%; left: 30%; animation: move3 60s infinite linear; }
  .b4 { background: var(--blob4-color); top: 10%; right: 20%; animation: move4 45s infinite linear; }
  .b5 { background: var(--blob5-color); bottom: 20%; left: 10%; animation: move1 55s infinite linear reverse; }
  .b6 { background: var(--blob6-color); top: 30%; right: 10%; animation: move2 65s infinite linear reverse; }

  @keyframes move1 {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(100px, 200px) scale(1.2); }
    66% { transform: translate(200px, -100px) scale(0.8); }
    100% { transform: translate(0, 0) scale(1); }
  }

  @keyframes move2 {
    0% { transform: translate(0, 0) scale(1.2); }
    50% { transform: translate(-200px, -300px) scale(0.7); }
    100% { transform: translate(0, 0) scale(1.2); }
  }

  @keyframes move3 {
    0% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(150px, 150px) rotate(180deg); }
    100% { transform: translate(0, 0) rotate(360deg); }
  }

  @keyframes move4 {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-300px, 100px) scale(1.5); }
    100% { transform: translate(0, 0) scale(1); }
  }

  svg {
    display: none;
  }
</style>
</head>
<body>

<div class="gradient-bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
  <div class="blob b6"></div>
</div>

<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="goo">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100" result="blur" />
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="destatNoise" />
      <feComponentTransfer in="destatNoise" result="grain">
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feComposite in="blur" in2="grain" operator="over" />
    </filter>
  </defs>
</svg>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warm Particle Background</title>

<style>
  html {
    font: 5vmin/1.3 serif;
    overflow: hidden;
    background: #0a0a0a;
  }

  body {
    margin: 0;
    font-size: 52px;
    color: transparent;
  }

  .layer {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 3em;
    height: 3em;
    content: '.';
    mix-blend-mode: screen;
    animation: move infinite ease-in-out alternate;
  }

  .l1 { animation-duration: 88s; }
  .l2 { animation-duration: 76s; }
  .l3 { animation-duration: 94s; }
  .l4 { animation-duration: 62s; }

  @keyframes move {
    0% {
      transform: rotate(0deg) scale(12) translate(-20px, -10px);
    }
    33% {
      transform: rotate(120deg) scale(15) translate(30px, 20px);
    }
    66% {
      transform: rotate(240deg) scale(14) translate(-10px, 40px);
    }
    100% {
      transform: rotate(360deg) scale(18) translate(20px, -20px);
    }
  }
</style>
</head>

<body>

<div class="layer l1">.</div>
<div class="layer l2">.</div>
<div class="layer l3">.</div>
<div class="layer l4">.</div>

<script>
function generateDots(count) {
  let shadows = [];

  for (let i = 0; i < count; i++) {
    // position
    let x = (-0.5 + Math.random() * 3).toFixed(2) + "em";
    let y = (-0.5 + Math.random() * 3).toFixed(2) + "em";

    // warm color range (orange → yellow)
    let hue = Math.floor(30 + Math.random() * 35); // 30–65
    let sat = 90 + Math.random() * 10;             // 90–100%
    let light = 55 + Math.random() * 15;           // 55–70%

    let color = `hsla(${hue}, ${sat}%, ${light}%, 0.9)`;

    shadows.push(`${x} ${y} 7px ${color}`);
  }

  return shadows.join(",");
}

// apply to all layers
document.querySelectorAll('.layer').forEach(el => {
  el.style.textShadow = generateDots(40);
});
</script>

</body>
</html>

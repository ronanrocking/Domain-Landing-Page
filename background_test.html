```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warm Particle Background</title>

<style>
  html {
    font: 5vmin/1.3 serif;
    overflow: hidden;
    background: #ffae42;
  }

  body {
    margin: 0;
    font-size: 32px;
    color: transparent;
  }

  .layer {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 3em;
    height: 3em;
    content: '.';
    mix-blend-mode: multiply;
    animation: move infinite ease-in-out alternate;
  }

  .l1 { animation-duration: 88s; }
  .l2 { animation-duration: 76s; }
  .l3 { animation-duration: 94s; }
  .l4 { animation-duration: 62s; }

  @keyframes move {
    0% {
      transform: rotate(0deg) scale(10) translate(-20px, -10px);
    }
    33% {
      transform: rotate(120deg) scale(12) translate(30px, 20px);
    }
    66% {
      transform: rotate(240deg) scale(11) translate(-10px, 40px);
    }
    100% {
      transform: rotate(360deg) scale(14) translate(20px, -20px);
    }
  }
</style>
</head>

<body>

<div class="layer l1">.</div>
<div class="layer l2">.</div>
<div class="layer l3">.</div>
<div class="layer l4">.</div>

<script>
function generateDots(count) {
  let shadows = [];

  for (let i = 0; i < count; i++) {
    // position
    let x = (-0.5 + Math.random() * 3).toFixed(2) + "em";
    let y = (-0.5 + Math.random() * 3).toFixed(2) + "em";

    // warm color range (bright red → orange)
    let hue = Math.floor(0 + Math.random() * 25); // 0–25 (red to bright orange)
    let sat = 95 + Math.random() * 5;             // 95–100% (highly saturated)
    let light = 50 + Math.random() * 20;          // 50–70% (brighter)

    let color = `hsla(${hue}, ${sat}%, ${light}%, 0.8)`;

    shadows.push(`${x} ${y} 15px ${color}`);
  }

  return shadows.join(",");
}

// apply to all layers
document.querySelectorAll('.layer').forEach(el => {
  el.style.textShadow = generateDots(40);
});
</script>

</body>
</html>
